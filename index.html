<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4slgy Portfolio</title>
  <link rel="icon" href="https://cdn.iconscout.com/icon/free/png-512/code-280-460136.png" type="image.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(135deg, #1a0000, #4d0000, #7a0019, #b30021, #3a0000);
      background-size: 1000% 1000%;
      animation: waveGradient 30s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    @keyframes waveGradient {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    header {
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
    }

    header h1 {
      font-size: 24px;
      color: #fff;
    }

    header nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.2s ease;
    }

    header nav a:hover {
      color: #ff4d5e;
    }

    .hero {
      text-align: center;
      margin-top: 10vh;
    }

    .typewriter h1 {
      font-size: 48px;
      overflow: hidden;
      border-right: .15em solid #ff4d5e;
      white-space: nowrap;
      margin: 0 auto;
      letter-spacing: .1em;
      animation: typing 3.5s steps(30, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: #ff4d5e; }
    }

    #dynamic-text {
      font-size: 64px;
      font-weight: 900;
      color: #ff4d5e;
      margin-top: 20px;
      height: 80px;
    }

    .hero p {
      margin-top: 20px;
      font-size: 20px;
    }

    .tags {
      margin-top: 20px;
    }

    .tags span {
      display: inline-block;
      background-color: #b3001f;
      padding: 6px 14px;
      margin: 4px;
      border-radius: 20px;
      font-size: 14px;
    }

    footer {
      padding: 30px 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.35);
      width: 100%;
    }

    .footer-icons {
      margin-top: 10px;
    }

    .footer-icons a {
      margin: 0 10px;
      display: inline-block;
      font-size: 24px;
      color: white;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-icons a:hover {
      color: #ff4d5e;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <header>
    <h1>4slgy</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
    </nav>
  </header>

  <section class="hero">
    <div class="typewriter">
      <h1>Hey, I'm 4slgy!</h1>
    </div>
    <h2 id="dynamic-text"></h2>
    <p>Let's work together and do something <strong>incredible</strong>?</p>
    <div class="tags">
      <span>Unity</span>
      <span>Unreal</span>
      <span>Godot</span>
      <span>C#</span>
      <span>Python</span>
      <span>Lua,Roblox</span>
    </div>
  </section>

  <footer>
    <div><strong>Quick Links</strong></div>
    <div class="footer-icons">
      <a href="https://mail.google.com/mail/u/1/#inbox?compose=GTvVlcSKkHWPGgbhpVlpLRXkhsKHMlMzXvjcPZSBljjlLJpMGSDwwNqqqJztZcqpXqwPJVWWRVNWT"><i class="fas fa-envelope"></i></a>
      <a href="https://projectpolter.itch.io/"><i class="fas fa-image"></i></a>
      <a href="#"><i class="fab fa-linkedin"></i></a>
    </div>
    <p>&copy; 2025 4slgy. All rights reserved.</p>
  </footer>

  <script>
    const phrases = [
      "Let's develop",
      "Let's create",
      "Let's innovate",
      "Let's make a memory",
      "Let's pave the way"
    ];

    const el = document.getElementById('dynamic-text');
    let phraseIndex = 0;
    let charIndex = 0;
    let isDeleting = false;

    function typeEffect() {
      const currentPhrase = phrases[phraseIndex];
      if (isDeleting) {
        el.textContent = currentPhrase.substring(0, charIndex--);
        if (charIndex < 0) {
          isDeleting = false;
          phraseIndex = (phraseIndex + 1) % phrases.length;
        }
      } else {
        el.textContent = currentPhrase.substring(0, charIndex++);
        if (charIndex > currentPhrase.length) {
          isDeleting = true;
          setTimeout(typeEffect, 1000);
          return;
        }
      }
      setTimeout(typeEffect, isDeleting ? 50 : 100);
    }

    typeEffect();
  </script>
</body>
</html>
